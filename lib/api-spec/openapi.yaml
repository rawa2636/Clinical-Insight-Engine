openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Hospital Intelligence Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cases
    description: Clinical case operations
  - name: consultations
    description: Online doctor consultations
  - name: doctors
    description: Available doctors
  - name: hospitals
    description: Hospital network
  - name: transfers
    description: Hospital case transfers
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: List all clinical cases
      responses:
        "200":
          description: List of cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClinicalCase"
    post:
      operationId: createCase
      tags: [cases]
      summary: Submit a new clinical case report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseRequest"
      responses:
        "201":
          description: Case created and analyzed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicalCase"

  /cases/{id}:
    get:
      operationId: getCase
      tags: [cases]
      summary: Get a specific case by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicalCase"
        "404":
          description: Case not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCase
      tags: [cases]
      summary: Delete a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /cases/{id}/acknowledge:
    post:
      operationId: acknowledgeCase
      tags: [cases]
      summary: Acknowledge a CRITICAL case alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicalCase"

  /cases/{id}/assign-doctor:
    post:
      operationId: assignDoctor
      tags: [cases]
      summary: Assign a doctor to a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignDoctorRequest"
      responses:
        "200":
          description: Doctor assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicalCase"

  /cases/{id}/diagnosis:
    post:
      operationId: updateDiagnosis
      tags: [cases]
      summary: Doctor records diagnosis notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosisRequest"
      responses:
        "200":
          description: Diagnosis updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicalCase"

  /cases/{id}/update-status:
    post:
      operationId: updateCaseStatus
      tags: [cases]
      summary: Update the lifecycle status of a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicalCase"

  /doctors:
    get:
      operationId: listDoctors
      tags: [doctors]
      summary: List available specialist doctors
      responses:
        "200":
          description: List of doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"

  /hospitals:
    get:
      operationId: listHospitals
      tags: [hospitals]
      summary: List hospitals in the network
      responses:
        "200":
          description: List of hospitals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hospital"

  /transfers:
    get:
      operationId: listTransfers
      tags: [transfers]
      summary: List all hospital transfers
      responses:
        "200":
          description: List of transfers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transfer"
    post:
      operationId: createTransfer
      tags: [transfers]
      summary: Create a hospital transfer request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransferRequest"
      responses:
        "201":
          description: Transfer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"

  /transfers/{id}:
    get:
      operationId: getTransfer
      tags: [transfers]
      summary: Get a transfer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transfer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"

  /transfers/{id}/accept:
    post:
      operationId: acceptTransfer
      tags: [transfers]
      summary: Accept an incoming transfer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transfer accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"

  /transfers/{id}/reject:
    post:
      operationId: rejectTransfer
      tags: [transfers]
      summary: Reject a transfer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Transfer rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"

  /transfers/{id}/in-transit:
    post:
      operationId: markTransferInTransit
      tags: [transfers]
      summary: Mark transfer as in-transit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transfer in-transit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"

  /transfers/{id}/arrived:
    post:
      operationId: markTransferArrived
      tags: [transfers]
      summary: Mark transfer as arrived
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transfer arrived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"

  /transfers/{id}/cancel:
    post:
      operationId: cancelTransfer
      tags: [transfers]
      summary: Cancel a transfer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transfer cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"

  /consultations:
    get:
      operationId: listConsultations
      tags: [consultations]
      summary: List all consultations
      responses:
        "200":
          description: List of consultations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Consultation"
    post:
      operationId: createConsultation
      tags: [consultations]
      summary: Book an online consultation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConsultationRequest"
      responses:
        "201":
          description: Consultation booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consultation"

  /consultations/{id}:
    get:
      operationId: getConsultation
      tags: [consultations]
      summary: Get consultation details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Consultation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consultation"

  /consultations/{id}/cancel:
    post:
      operationId: cancelConsultation
      tags: [consultations]
      summary: Cancel a consultation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Consultation cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consultation"

  /consultations/{id}/join:
    get:
      operationId: joinConsultation
      tags: [consultations]
      summary: Get join link for consultation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Join info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinConsultationResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success, message]

    RiskLevel:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    CaseStatus:
      type: string
      enum:
        - REPORT_RECEIVED
        - ANALYZED
        - CASE_CREATED
        - ROUTED_TO_HOSPITAL
        - RECEIVED_BY_HOSPITAL
        - ASSIGNED_TO_DOCTOR
        - DIAGNOSIS_IN_PROGRESS
        - COMPLETED

    RecommendedAction:
      type: string
      enum:
        - SELF_CARE
        - SCHEDULE_CONSULTATION
        - HOSPITAL_VISIT
        - EMERGENCY_RESPONSE

    ConsultationStatus:
      type: string
      enum: [SCHEDULED, ACTIVE, COMPLETED, CANCELLED]

    TransferStatus:
      type: string
      enum: [PENDING, ACCEPTED, IN_TRANSIT, ARRIVED, REJECTED, CANCELLED]

    Specialty:
      type: string
      enum:
        - GENERAL
        - CARDIOLOGY
        - PULMONOLOGY
        - NEUROLOGY
        - INTERNAL_MEDICINE
        - EMERGENCY_MEDICINE
        - PEDIATRICS
        - ORTHOPEDICS
        - DERMATOLOGY
        - PSYCHIATRY

    CreateCaseRequest:
      type: object
      properties:
        patientName:
          type: string
        age:
          type: integer
        gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
        chiefComplaint:
          type: string
        symptoms:
          type: array
          items:
            type: string
        vitalSigns:
          $ref: "#/components/schemas/VitalSigns"
        medicalHistory:
          type: string
        currentMedications:
          type: string
        reportType:
          type: string
          enum: [SOAP, JSON]
        rawReport:
          type: string
      required:
        - patientName
        - age
        - gender
        - chiefComplaint
        - symptoms
        - reportType

    AssignDoctorRequest:
      type: object
      properties:
        doctorId:
          type: integer
      required:
        - doctorId

    DiagnosisRequest:
      type: object
      properties:
        diagnosisNotes:
          type: string
        status:
          type: string
          enum: [DIAGNOSIS_IN_PROGRESS, COMPLETED]
      required:
        - diagnosisNotes

    UpdateStatusRequest:
      type: object
      properties:
        caseStatus:
          $ref: "#/components/schemas/CaseStatus"
      required:
        - caseStatus

    VitalSigns:
      type: object
      properties:
        temperature:
          type: number
        heartRate:
          type: integer
        bloodPressureSystolic:
          type: integer
        bloodPressureDiastolic:
          type: integer
        oxygenSaturation:
          type: number
        respiratoryRate:
          type: integer

    ClinicalCase:
      type: object
      properties:
        id:
          type: integer
        patientName:
          type: string
        age:
          type: integer
        gender:
          type: string
        chiefComplaint:
          type: string
        symptoms:
          type: array
          items:
            type: string
        vitalSigns:
          $ref: "#/components/schemas/VitalSigns"
        medicalHistory:
          type: string
        currentMedications:
          type: string
        reportType:
          type: string
        rawReport:
          type: string
        riskLevel:
          $ref: "#/components/schemas/RiskLevel"
        recommendedAction:
          $ref: "#/components/schemas/RecommendedAction"
        riskFactors:
          type: array
          items:
            type: string
        briefEnglish:
          type: string
        briefArabic:
          type: string
        acknowledged:
          type: boolean
        caseStatus:
          $ref: "#/components/schemas/CaseStatus"
        assignedDoctorId:
          type: integer
        diagnosisNotes:
          type: string
        recommendedDepartment:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - patientName
        - age
        - gender
        - chiefComplaint
        - symptoms
        - reportType
        - riskLevel
        - recommendedAction
        - riskFactors
        - briefEnglish
        - briefArabic
        - acknowledged
        - caseStatus
        - createdAt
        - updatedAt

    Hospital:
      type: object
      properties:
        id:
          type: integer
        nameEn:
          type: string
        nameAr:
          type: string
        city:
          type: string
        address:
          type: string
        phone:
          type: string
        specialties:
          type: array
          items:
            type: string
        isAvailable:
          type: string
        level:
          type: string
      required:
        - id
        - nameEn
        - nameAr
        - city
        - address
        - phone
        - specialties
        - isAvailable
        - level

    CreateTransferRequest:
      type: object
      properties:
        caseId:
          type: integer
        direction:
          type: string
          enum: [OUTGOING, INCOMING]
        toHospitalId:
          type: integer
        fromHospitalId:
          type: integer
        patientName:
          type: string
        patientAge:
          type: integer
        patientGender:
          type: string
        chiefComplaint:
          type: string
        riskLevel:
          type: string
        transportMethod:
          type: string
          enum: [AMBULANCE, AIR_AMBULANCE, PRIVATE_VEHICLE, HOSPITAL_TRANSPORT]
        clinicalSummary:
          type: string
        specialRequirements:
          type: string
        estimatedArrival:
          type: string
          format: date-time
      required:
        - direction
        - patientName
        - patientAge
        - patientGender
        - chiefComplaint
        - riskLevel
        - transportMethod
        - clinicalSummary

    Transfer:
      type: object
      properties:
        id:
          type: integer
        caseId:
          type: integer
        direction:
          type: string
        fromHospitalId:
          type: integer
        toHospitalId:
          type: integer
        fromHospital:
          $ref: "#/components/schemas/Hospital"
        toHospital:
          $ref: "#/components/schemas/Hospital"
        patientName:
          type: string
        patientAge:
          type: integer
        patientGender:
          type: string
        chiefComplaint:
          type: string
        riskLevel:
          type: string
        transportMethod:
          type: string
        clinicalSummary:
          type: string
        specialRequirements:
          type: string
        estimatedArrival:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/TransferStatus"
        rejectionReason:
          type: string
        transferCode:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - direction
        - fromHospitalId
        - toHospitalId
        - patientName
        - patientAge
        - patientGender
        - chiefComplaint
        - riskLevel
        - transportMethod
        - clinicalSummary
        - status
        - transferCode
        - createdAt
        - updatedAt

    Doctor:
      type: object
      properties:
        id:
          type: integer
        nameEn:
          type: string
        nameAr:
          type: string
        specialty:
          $ref: "#/components/schemas/Specialty"
        specialtyLabelEn:
          type: string
        specialtyLabelAr:
          type: string
        qualifications:
          type: string
        experience:
          type: integer
          description: Years of experience
        rating:
          type: number
        avatarInitials:
          type: string
        isAvailable:
          type: boolean
        consultationFeeUsd:
          type: number
        languages:
          type: array
          items:
            type: string
      required:
        - id
        - nameEn
        - nameAr
        - specialty
        - specialtyLabelEn
        - specialtyLabelAr
        - qualifications
        - experience
        - rating
        - avatarInitials
        - isAvailable
        - consultationFeeUsd
        - languages

    CreateConsultationRequest:
      type: object
      properties:
        caseId:
          type: integer
        doctorId:
          type: integer
        scheduledAt:
          type: string
          format: date-time
        patientNotes:
          type: string
        preferredLanguage:
          type: string
          enum: [EN, AR]
      required:
        - caseId
        - doctorId
        - scheduledAt

    Consultation:
      type: object
      properties:
        id:
          type: integer
        caseId:
          type: integer
        doctorId:
          type: integer
        doctor:
          $ref: "#/components/schemas/Doctor"
        patientName:
          type: string
        scheduledAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/ConsultationStatus"
        patientNotes:
          type: string
        preferredLanguage:
          type: string
        meetingRoomId:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - caseId
        - doctorId
        - patientName
        - scheduledAt
        - status
        - meetingRoomId
        - createdAt

    JoinConsultationResponse:
      type: object
      properties:
        consultationId:
          type: integer
        meetingRoomId:
          type: string
        joinUrl:
          type: string
        status:
          $ref: "#/components/schemas/ConsultationStatus"
      required:
        - consultationId
        - meetingRoomId
        - joinUrl
        - status
